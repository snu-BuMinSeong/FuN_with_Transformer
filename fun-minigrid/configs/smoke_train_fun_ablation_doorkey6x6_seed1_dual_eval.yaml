# Smoke test config for dual sample/argmax evaluation on DoorKey-6x6.
env_id: MiniGrid-DoorKey-6x6-v0
render_mode: null
seed: 1

total_episodes: 30
max_steps: 250
eval_interval: 10
eval_episodes: 5

gamma: 0.99
learning_rate: 0.0003

goal_update_interval: 10
hidden_dim: 64
goal_size: 16
goal_dim: 16
num_actions: 7
manager_type: ablation

entropy_coef: 0.01
value_loss_coef: 0.5
manager_loss_coef: 0.1
grad_clip_norm: 1.0

action_mode: sample
eval_action_modes:
  - sample
  - argmax
moving_avg_window: 20
log_interval: 10
eval_seed_offset: 1000

log_dir: logs/smoke_dual_eval/ablation_doorkey6x6_seed1
checkpoint_dir: checkpoints/smoke_dual_eval/ablation_doorkey6x6_seed1
