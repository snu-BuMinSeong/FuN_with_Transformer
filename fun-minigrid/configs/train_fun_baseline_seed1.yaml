# Week-3 vanilla FuN baseline config.
env_id: MiniGrid-DoorKey-5x5-v0
render_mode: null
seed: 1

total_episodes: 1000
max_steps: 250
eval_interval: 50
eval_episodes: 20

gamma: 0.99
learning_rate: 0.0003

goal_update_interval: 10
hidden_dim: 64
goal_size: 16
goal_dim: 16
num_actions: 7

entropy_coef: 0.01
value_loss_coef: 0.5
manager_loss_coef: 0.1
grad_clip_norm: 1.0

action_mode: sample
eval_action_mode: sample
moving_avg_window: 20
log_interval: 50
eval_seed_offset: 1000

log_dir: logs/baseline_fun/seed_1
checkpoint_dir: checkpoints/baseline_fun/seed_1
