# Vanilla FuN DoorKey-6x6 baseline seed 1 additional training to cumulative 5000 episodes.
env_id: MiniGrid-DoorKey-6x6-v0
render_mode: null
seed: 1

total_episodes: 2000
max_steps: 250
eval_interval: 50
eval_episodes: 50

gamma: 0.99
learning_rate: 0.0003

goal_update_interval: 10
hidden_dim: 64
goal_size: 16
goal_dim: 16
num_actions: 7
manager_type: recurrent

entropy_coef: 0.01
value_loss_coef: 0.5
manager_loss_coef: 0.1
grad_clip_norm: 1.0

action_mode: sample
eval_action_modes:
  - sample
  - argmax
moving_avg_window: 20
log_interval: 50
eval_seed_offset: 1000

resume_from_checkpoint: checkpoints/baseline_fun_doorkey6x6_3000/seed_1/best.pt
resume_optimizer_state: false

log_dir: logs/baseline_fun_doorkey6x6_5000/seed_1
checkpoint_dir: checkpoints/baseline_fun_doorkey6x6_5000/seed_1
